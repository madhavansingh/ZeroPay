name: zeropay

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: zeropay-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: zeropay
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: zeropay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # AOF persistence: survives container restarts
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API Server ────────────────────────────────────────────────────
  zeropay-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeropay-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      PORT: 5001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 20s

  # ── Background Worker Process ─────────────────────────────────────────────
  zeropay-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zeropay-worker
    restart: unless-stopped
    # Override CMD to launch worker process instead of API server
    command: ["node", "dist/worker.js"]
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      zeropay-api:
        condition: service_healthy

  # ── Frontend Static SPA ───────────────────────────────────────────────────
  zeropay-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5001
    container_name: zeropay-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - zeropay-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
